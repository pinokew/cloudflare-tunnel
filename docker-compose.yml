services:
  # ===================================================
  # CLOUDFLARE TUNNEL
  # Підключається до proxy-net (external) — мережа, яку
  # створює DSpace-stack (або Traefik-stack у майбутньому).
  # ===================================================
  tunnel:
    image: cloudflare/cloudflared:${CLOUDFLARE_TUNNEL_VERSION:-2026.2.0}
    container_name: cf-tunnel
    restart: always
    networks:
      - proxy-net
    # environment:
    #   - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    command: tunnel --metrics 0.0.0.0:2000 run
    healthcheck:
      test: ["CMD", "cloudflared", "tunnel", "--metrics", "127.0.0.1:2000", "ready"]
      interval: 20s
      timeout: 3s
      retries: 6
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  proxy-net:
    external: true
    name: ${PROXY_NET_NAME:-proxy-net}
